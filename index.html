<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uBreakiFix Pricing Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .banner {
            background-color: #ff6b35;
            color: white;
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-on-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .add-on-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .add-on-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            opacity: 1;
            transition: opacity 0.3s;
        }

        .add-on-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .add-on-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .add-on-item label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            color: #333;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #333;
            font-size: 14px;
        }

        .result-row.total {
            border-top: 2px solid #667eea;
            padding-top: 12px;
            margin-top: 12px;
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="banner">
        🎉 10% ATC Member Discount Available - Ask Us How!
    </div>

    <div class="container">
        <h1>uBreakiFix Pricing Calculator</h1>

        <form id="pricingForm">
            <div class="form-group">
                <label for="deviceType">Device Type</label>
                <select id="deviceType" required>
                    <option value="">Select a device...</option>
                    <option value="Phone">Phone</option>
                    <option value="Tablet">Tablet</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Desktop">Desktop</option>
                    <option value="Console">Console</option>
                </select>
            </div>

            <div class="form-group">
                <label for="partCost">Part Cost ($)</label>
                <input type="number" id="partCost" placeholder="Enter part cost" step="0.01" min="0" required>
                <div class="error" id="partCostError"></div>
            </div>

            <div class="add-on-section">
                <h3>Add-On Services</h3>
                <div class="add-on-item" id="basicCleaningItem">
                    <input type="checkbox" id="basicCleaning" name="addons">
                    <label for="basicCleaning">Basic Cleaning ($29.99–$119.99)</label>
                </div>
                <div class="add-on-item" id="liquidCleaningItem">
                    <input type="checkbox" id="liquidCleaning" name="addons">
                    <label for="liquidCleaning">Liquid Cleaning ($149.99–$199.99)</label>
                </div>
                <div class="add-on-item" id="dataTransferItem">
                    <input type="checkbox" id="dataTransfer" name="addons">
                    <label for="dataTransfer">Data Transfer ($149.99)</label>
                </div>
                <div class="add-on-item" id="protectiveScreenItem">
                    <input type="checkbox" id="protectiveScreen" name="addons">
                    <label for="protectiveScreen">Protective Screen ($29.99–$39.99)</label>
                </div>
                <div class="add-on-item" id="softwareItem">
                    <input type="checkbox" id="software" name="addons">
                    <label for="software">Software ($149.99)</label>
                </div>
                <div class="add-on-item" id="expeditedRepairItem">
                    <input type="checkbox" id="expeditedRepair" name="addons">
                    <label for="expeditedRepair">Expedited Repair ($49.99)</label>
                </div>
            </div>

            <button type="submit">Calculate Quote</button>
        </form>

        <div class="results" id="results">
            <div class="result-row">
                <span>Labor Cost:</span>
                <span id="laborCost">$0.00</span>
            </div>
            <div class="result-row">
                <span>Add-On Services:</span>
                <span id="addOnsCost">$0.00</span>
            </div>
            <div class="result-row total">
                <span>Total Quote:</span>
                <span id="totalQuote">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        const deviceMinimums = {
            "Phone": 100,
            "Tablet": 100,
            "Laptop": 120,
            "Desktop": 150,
            "Console": 110
        };

        const addOnPrices = {
            "basicCleaning": { min: 29.99, max: 119.99 },
            "liquidCleaning": { min: 149.99, max: 199.99 },
            "dataTransfer": 149.99,
            "protectiveScreen": { min: 29.99, max: 39.99 },
            "software": 149.99,
            "expeditedRepair": 49.99
        };

        const addOnAvailability = {
            "Phone": ["basicCleaning", "liquidCleaning", "dataTransfer", "protectiveScreen", "software", "expeditedRepair"],
            "Tablet": ["basicCleaning", "liquidCleaning", "dataTransfer", "protectiveScreen", "software", "expeditedRepair"],
            "Laptop": ["basicCleaning", "liquidCleaning", "dataTransfer", "software", "expeditedRepair"],
            "Desktop": ["basicCleaning", "software", "expeditedRepair"],
            "Console": ["basicCleaning", "expeditedRepair"]
        };

        function roundToNearestNine99(value) {
            const remainder = value % 1;
            const base = Math.floor(value);

            if (remainder < 0.5) {
                return base + 0.99;
            } else if (remainder < 0.99) {
                return base + 0.99;
            } else {
                return base + 1 + 0.99;
            }
        }

        function updateAddOnAvailability() {
            const deviceType = document.getElementById("deviceType").value;
            const availableAddOns = addOnAvailability[deviceType] || [];

            Object.keys(addOnPrices).forEach(addOnId => {
                const item = document.getElementById(addOnId + "Item");
                const checkbox = document.getElementById(addOnId);

                if (availableAddOns.includes(addOnId)) {
                    item.classList.remove("disabled");
                } else {
                    item.classList.add("disabled");
                    checkbox.checked = false;
                }
            });
        }

        function calculateQuote(event) {
            event.preventDefault();

            const deviceType = document.getElementById("deviceType").value;
            const partCost = parseFloat(document.getElementById("partCost").value);
            const partCostError = document.getElementById("partCostError");

            partCostError.textContent = "";

            if (!deviceType || isNaN(partCost) || partCost < 0) {
                partCostError.textContent = "Please enter a valid part cost.";
                document.getElementById("results").classList.remove("show");
                return;
            }

            let markup;

            if (deviceType === "Phone" || deviceType === "Tablet") {
                if (partCost < 50) markup = 3.75;
                else if (partCost <= 100) markup = 2.50;
                else markup = 2.0;
            } else {
                if (partCost < 50) markup = 4;
                else if (partCost <= 100) markup = 2.75;
                else markup = 2.25;
            }

            let laborCost = partCost * markup;
            const deviceMinimum = deviceMinimums[deviceType];
            laborCost = Math.max(laborCost, deviceMinimum);

            let addOnsCost = 0;
            document.querySelectorAll('input[name="addons"]:checked').forEach(checkbox => {
                const addOnId = checkbox.id;
                const price = addOnPrices[addOnId];

                if (typeof price === "object") {
                    addOnsCost += price.min;
                } else {
                    addOnsCost += price;
                }
            });

            const totalQuote = laborCost + addOnsCost;
            const finalQuote = roundToNearestNine99(totalQuote);

            document.getElementById("laborCost").textContent = "$" + laborCost.toFixed(2);
            document.getElementById("addOnsCost").textContent = "$" + addOnsCost.toFixed(2);
            document.getElementById("totalQuote").textContent = "$" + finalQuote.toFixed(2);
            document.getElementById("results").classList.add("show");
        }

        document.getElementById("deviceType").addEventListener("change", updateAddOnAvailability);
        document.getElementById("pricingForm").addEventListener("submit", calculateQuote);
    </script>
</body>
</html>
