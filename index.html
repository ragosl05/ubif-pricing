<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uBreakiFix Pricing Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header .subtext {
            font-size: 14px;
            color: #999;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .addons-section {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .addons-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .addon-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .addon-item:last-child {
            margin-bottom: 0;
        }

        .addon-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .addon-item label {
            margin-bottom: 0;
            font-weight: 500;
            color: #555;
            cursor: pointer;
            flex: 1;
        }

        .addon-price {
            font-size: 13px;
            color: #999;
            font-weight: 500;
        }

        .quote-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            color: white;
        }

        .quote-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .quote-price {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .quote-subtotal {
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 12px;
        }

        .breakdown {
            font-size: 12px;
            opacity: 0.8;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 12px;
            margin-top: 12px;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .breakdown-item:last-child {
            margin-bottom: 0;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Pricing Calculator</h1>
            <p class="subtext">by asurion</p>
        </div>

        <div class="form-group">
            <label for="device">Device Type</label>
            <select id="device">
                <option value="phone">Phone</option>
                <option value="tablet">Tablet</option>
                <option value="laptop">Laptop</option>
                <option value="desktop">Desktop</option>
                <option value="console">Gaming Console</option>
            </select>
        </div>

        <div class="form-group">
            <label for="partCost">Part Cost ($)</label>
            <input type="number" id="partCost" placeholder="0.00" min="0" step="0.01">
            <div id="partError" class="error"></div>
        </div>

        <div class="addons-section">
            <h3>Add-On Services</h3>
            <div class="addon-item">
                <input type="checkbox" id="diagnostics" value="diagnostics">
                <label for="diagnostics">Diagnostics</label>
                <span class="addon-price">+$29.99</span>
            </div>
            <div class="addon-item">
                <input type="checkbox" id="dataRecovery" value="dataRecovery">
                <label for="dataRecovery">Data Recovery</label>
                <span class="addon-price">+$49.99</span>
            </div>
            <div class="addon-item">
                <input type="checkbox" id="extendedWarranty" value="extendedWarranty">
                <label for="extendedWarranty">Extended Warranty</label>
                <span class="addon-price">+$79.99</span>
            </div>
            <div class="addon-item">
                <input type="checkbox" id="premiumSupport" value="premiumSupport">
                <label for="premiumSupport">Premium Support</label>
                <span class="addon-price">+$149.99</span>
            </div>
        </div>

        <div class="quote-display">
            <div class="quote-label">Estimated Quote</div>
            <div class="quote-price" id="quotePrice">$0.00</div>
            <div class="quote-subtotal" id="quoteSubtotal"></div>
            <div class="breakdown" id="breakdown"></div>
        </div>

        <button onclick="generateQuote()">Generate Quote</button>
    </div>

    <script>
        const pricingConfig = {
            phone: {
                baseLabor: 100,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ]
            },
            tablet: {
                baseLabor: 100,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ]
            },
            laptop: {
                baseLabor: 150,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ]
            },
            desktop: {
                baseLabor: 150,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ]
            },
            console: {
                baseLabor: 125,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ]
            }
        };

        const addonPrices = {
            diagnostics: 29.99,
            dataRecovery: 49.99,
            extendedWarranty: 79.99,
            premiumSupport: 149.99
        };

        function roundToNearestNinetyNine(price) {
            const cents = Math.round((price % 1) * 100);
            if (cents === 99) return price;
            const base = Math.floor(price);
            return base + 0.99;
        }

        function calculateQuote() {
            const deviceType = document.getElementById('device').value;
            const partCost = parseFloat(document.getElementById('partCost').value) || 0;
            const partError = document.getElementById('partError');

            partError.textContent = '';

            if (partCost < 0) {
                partError.textContent = 'Part cost cannot be negative.';
                return null;
            }

            const config = pricingConfig[deviceType];
            const applicableMarkup = config.markups.find(m => partCost < m.threshold);
            const multiplier = applicableMarkup.multiplier;

            const laborCost = (config.baseLabor + partCost) * multiplier;
            let totalQuote = laborCost;

            const selectedAddons = Array.from(document.querySelectorAll('.addon-item input[type="checkbox"]:checked'))
                .map(checkbox => checkbox.value);

            let addonTotal = 0;
            selectedAddons.forEach(addon => {
                addonTotal += addonPrices[addon];
            });

            totalQuote += addonTotal;
            totalQuote = roundToNearestNinetyNine(totalQuote);

            return {
                deviceType,
                partCost,
                multiplier,
                laborCost,
                addonTotal,
                selectedAddons,
                totalQuote
            };
        }

        function generateQuote() {
            const result = calculateQuote();
            if (!result) return;

            const quotePrice = document.getElementById('quotePrice');
            const quoteSubtotal = document.getElementById('quoteSubtotal');
            const breakdown = document.getElementById('breakdown');

            quotePrice.textContent = `$${result.totalQuote.toFixed(2)}`;

            let subtotalText = '';
            if (result.addonTotal > 0) {
                const laborQuote = result.laborCost;
                const laborRounded = roundToNearestNinetyNine(laborQuote);
                subtotalText = `Labor + Part: $${laborRounded.toFixed(2)} | Add-ons: $${result.addonTotal.toFixed(2)}`;
            }
            quoteSubtotal.textContent = subtotalText;

            let breakdownHTML = `
                <div class="breakdown-item">
                    <span>Base Labor:</span>
                    <span>$${pricingConfig[result.deviceType].baseLabor.toFixed(2)}</span>
                </div>
                <div class="breakdown-item">
                    <span>Part Cost:</span>
                    <span>$${result.partCost.toFixed(2)}</span>
                </div>
                <div class="breakdown-item">
                    <span>Multiplier (${result.multiplier}x):</span>
                    <span>${((result.multiplier - 1) * 100).toFixed(0)}%</span>
                </div>
            `;

            if (result.selectedAddons.length > 0) {
                breakdownHTML += `<div class="breakdown-item" style="margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 8px;">
                    <span>Add-ons:</span>
                    <span>$${result.addonTotal.toFixed(2)}</span>
                </div>`;
            }

            breakdown.innerHTML = breakdownHTML;
        }

        document.getElementById('device').addEventListener('change', generateQuote);
        document.getElementById('partCost').addEventListener('input', generateQuote);
        document.querySelectorAll('.addon-item input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', generateQuote);
        });

        generateQuote();
    </script>
</body>
</html>
