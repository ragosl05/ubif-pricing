<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uBreakiFix Pricing Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-ons {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .add-on-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .add-on-item:last-child {
            margin-bottom: 0;
        }

        .add-on-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .add-on-item label {
            margin-bottom: 0;
            font-weight: 400;
            cursor: pointer;
            flex: 1;
        }

        .add-on-price {
            color: #667eea;
            font-weight: 600;
            font-size: 13px;
        }

        .quote-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .quote-label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .quote-amount {
            font-size: 48px;
            font-weight: 700;
        }

        .button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Pricing Calculator</h1>
            <p>by asurion</p>
        </div>

        <div class="form-group">
            <label for="deviceType">Device Type</label>
            <select id="deviceType">
                <option value="">Select a device...</option>
                <option value="phone">Phone</option>
                <option value="tablet">Tablet</option>
                <option value="laptop">Laptop</option>
                <option value="desktop">Desktop</option>
                <option value="console">Console</option>
            </select>
        </div>

        <div class="form-group">
            <label for="partCost">Part Cost ($)</label>
            <input type="number" id="partCost" placeholder="0.00" step="0.01" min="0">
        </div>

        <div class="add-ons" id="addOns" style="display: none;"></div>

        <div class="quote-section">
            <div class="quote-label">Total Quote</div>
            <div class="quote-amount" id="quote">$0.00</div>
        </div>

        <button class="button">Get Quote</button>
    </div>

    <script>
        const pricingConfig = {
            phone: {
                baseLabor: 100,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 29.99 },
                    { name: 'Liquid Cleaning', price: 149.99 },
                    { name: 'Data Transfer', price: 149.99 }
                ]
            },
            tablet: {
                baseLabor: 100,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 29.99 },
                    { name: 'Liquid Cleaning', price: 149.99 },
                    { name: 'Data Transfer', price: 149.99 }
                ]
            },
            laptop: {
                baseLabor: 150,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 99.99 },
                    { name: 'Liquid Cleaning', price: 199.99 },
                    { name: 'Data Transfer', price: 149.99 },
                    { name: 'Expedited Repair', price: 49.99 }
                ]
            },
            desktop: {
                baseLabor: 150,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 99.99 },
                    { name: 'Liquid Cleaning', price: 199.99 },
                    { name: 'Data Transfer', price: 149.99 },
                    { name: 'Expedited Repair', price: 49.99 }
                ]
            },
            console: {
                baseLabor: 125,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 99.99 },
                    { name: 'Liquid Cleaning', price: 199.99 },
                    { name: 'Data Transfer', price: 149.99 },
                    { name: 'Expedited Repair', price: 49.99 }
                ]
            }
        };

        function calculateQuote() {
            const deviceType = document.getElementById('deviceType').value;
            const partCost = parseFloat(document.getElementById('partCost').value) || 0;
            const selectedAddOns = Array.from(document.querySelectorAll('input[name="addOn"]:checked'))
                .map(checkbox => parseFloat(checkbox.value));

            if (!deviceType) {
                document.getElementById('quote').textContent = '$0.00';
                return;
            }

            const config = pricingConfig[deviceType];
            const applicableMarkup = config.markups.find(m => partCost <= m.threshold);
            const multiplier = applicableMarkup.multiplier;

            // Margin-only calculation
            const margin = (config.baseLabor + partCost) * multiplier;
            const roundedMargin = Math.floor(margin) + 0.99;

            const addOnTotal = selectedAddOns.reduce((sum, price) => sum + price, 0);
            const finalTotal = roundedMargin + addOnTotal;

            document.getElementById('quote').textContent = '$' + finalTotal.toFixed(2);
        }

        function updateAddOns() {
            const deviceType = document.getElementById('deviceType').value;
            const addOnContainer = document.getElementById('addOns');

            if (!deviceType) {
                addOnContainer.style.display = 'none';
                return;
            }

            const config = pricingConfig[deviceType];
            addOnContainer.style.display = 'block';
            addOnContainer.innerHTML = config.addOns.map((addOn, index) =>
                `<div class="add-on-item">
                    <input type="checkbox" id="addon-${index}" name="addOn" value="${addOn.price}" onchange="calculateQuote()">
                    <label for="addon-${index}">${addOn.name}</label>
                    <span class="add-on-price">+$${addOn.price.toFixed(2)}</span>
                </div>`
            ).join('');
        }

        document.getElementById('deviceType').addEventListener('change', updateAddOns);
        document.getElementById('partCost').addEventListener('input', calculateQuote);
    </script>
</body>
</html>
