<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uBreakiFix Pricing Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-ons {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .add-on-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .add-on-item:last-child {
            margin-bottom: 0;
        }

        .add-on-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .add-on-item label {
            margin-bottom: 0;
            font-weight: 400;
            cursor: pointer;
            flex: 1;
        }

        .add-on-price {
            color: #667eea;
            font-weight: 600;
            font-size: 13px;
        }

        .quote-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .quote-label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .quote-amount {
            font-size: 48px;
            font-weight: 700;
        }

        .button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Pricing Calculator</h1>
            <p>by asurion</p>
        </div>

        <div class="form-group">
            <label for="device">Device Type</label>
            <select id="device">
                <option value="">Select a device...</option>
                <option value="phone">Phone</option>
                <option value="tablet">Tablet</option>
                <option value="laptop">Laptop</option>
                <option value="desktop">Desktop</option>
                <option value="console">Console</option>
            </select>
        </div>

        <div class="form-group">
            <label for="partCost">Part Cost ($)</label>
            <input type="number" id="partCost" placeholder="0.00" step="0.01" min="0">
        </div>

        <div class="add-ons" id="addOnsContainer" style="display: none;">
            <label style="margin-bottom: 12px; display: block;">Add-ons</label>
            <div id="addOnsList"></div>
        </div>

        <div class="quote-section">
            <div class="quote-label">Total Quote</div>
            <div class="quote-amount" id="quote">$0.00</div>
        </div>

        <button class="button">Get Quote</button>
    </div>

    <script>
        const pricingConfig = {
            phone: {
                baseLabor: 100,
                addOns: [
                    { name: 'Screen Protector', price: 15.00 },
                    { name: 'Case', price: 25.00 },
                    { name: 'Data Transfer', price: 30.00 }
                ]
            },
            tablet: {
                baseLabor: 100,
                addOns: [
                    { name: 'Screen Protector', price: 20.00 },
                    { name: 'Case', price: 35.00 }
                ]
            },
            laptop: {
                baseLabor: 150,
                addOns: [
                    { name: 'Software Installation', price: 50.00 },
                    { name: 'Data Recovery', price: 100.00 }
                ]
            },
            desktop: {
                baseLabor: 150,
                addOns: [
                    { name: 'Setup & Configuration', price: 60.00 },
                    { name: 'Data Recovery', price: 100.00 }
                ]
            },
            console: {
                baseLabor: 125,
                addOns: [
                    { name: 'Controller Pair', price: 80.00 },
                    { name: 'Extended Warranty', price: 40.00 }
                ]
            }
        };

        const deviceSelect = document.getElementById('device');
        const partCostInput = document.getElementById('partCost');
        const quoteDisplay = document.getElementById('quote');
        const addOnsContainer = document.getElementById('addOnsContainer');
        const addOnsList = document.getElementById('addOnsList');

        function getMultiplier(partCost) {
            if (partCost <= 50) return 1.50;
            if (partCost <= 100) return 1.40;
            if (partCost <= 300) return 1.30;
            return 1.25;
        }

        function calculateQuote() {
            const device = deviceSelect.value;
            const partCost = parseFloat(partCostInput.value) || 0;

            if (!device) {
                quoteDisplay.textContent = '$0.00';
                return;
            }

            const config = pricingConfig[device];
            const baseLabor = config.baseLabor;
            const multiplier = getMultiplier(partCost);

            // Margin-only calculation
            const margin = (baseLabor + partCost) * multiplier;

            // Get selected add-ons
            const addOns = Array.from(addOnsList.querySelectorAll('input[type="checkbox"]:checked'))
                .reduce((sum, checkbox) => sum + parseFloat(checkbox.dataset.price), 0);

            // Total = margin + add-ons
            const total = margin + addOns;

            // Round to nearest .99
            const rounded = Math.floor(total) + 0.99;

            quoteDisplay.textContent = '$' + rounded.toFixed(2);
        }

        function populateAddOns(device) {
            addOnsList.innerHTML = '';
            const config = pricingConfig[device];

            if (!config || config.addOns.length === 0) {
                addOnsContainer.style.display = 'none';
                return;
            }

            addOnsContainer.style.display = 'block';

            config.addOns.forEach((addOn, index) => {
                const div = document.createElement('div');
                div.className = 'add-on-item';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = `addon-${index}`;
                checkbox.dataset.price = addOn.price;
                checkbox.addEventListener('change', calculateQuote);

                const label = document.createElement('label');
                label.htmlFor = `addon-${index}`;
                label.textContent = addOn.name;

                const price = document.createElement('span');
                price.className = 'add-on-price';
                price.textContent = '+$' + addOn.price.toFixed(2);

                div.appendChild(checkbox);
                div.appendChild(label);
                div.appendChild(price);
                addOnsList.appendChild(div);
            });

            calculateQuote();
        }

        deviceSelect.addEventListener('change', () => {
            populateAddOns(deviceSelect.value);
        });

        partCostInput.addEventListener('input', calculateQuote);
    </script>
</body>
</html>
