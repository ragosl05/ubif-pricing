<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uBreakiFix Pricing Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .calculator-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 4px;
        }

        .header p {
            color: #999;
            font-size: 12px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .add-ons-section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .add-ons-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .add-on {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .add-on.hidden {
            display: none;
        }

        .add-on input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            cursor: pointer;
        }

        .add-on label {
            display: flex;
            justify-content: space-between;
            flex: 1;
            margin: 0;
            cursor: pointer;
        }

        .add-on-name {
            font-size: 13px;
            color: #333;
        }

        .add-on-price {
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
        }

        .quote-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .quote-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 6px;
        }

        .quote-amount {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .quote-breakdown {
            font-size: 12px;
            opacity: 0.85;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .breakdown-item.margin {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 8px;
            margin-top: 8px;
            font-weight: 600;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-calculate:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        @media (max-width: 640px) {
            .calculator-wrapper {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .quote-amount {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-wrapper">
        <div class="header">
            <h1>uBreakiFix Pricing Calculator</h1>
            <p>by asurion</p>
        </div>

        <div class="form-group">
            <label for="device-type">Device Type</label>
            <select id="device-type" required>
                <option value="">Select device type...</option>
                <option value="phone">Phone</option>
                <option value="tablet">Tablet</option>
                <option value="laptop">Laptop / Desktop</option>
                <option value="console">Console</option>
            </select>
        </div>

        <div class="form-group">
            <label for="part-cost">Part Cost ($)</label>
            <input type="number" id="part-cost" placeholder="0.00" step="0.01" min="0">
        </div>

        <div class="add-ons-section">
            <div class="add-ons-title">Add-On Services</div>
            <div class="add-on">
                <input type="checkbox" id="basic-cleaning">
                <label for="basic-cleaning">
                    <span class="add-on-name">Basic Cleaning</span>
                    <span class="add-on-price" id="basic-cleaning-price">$39.99</span>
                </label>
            </div>
            <div class="add-on">
                <input type="checkbox" id="liquid-cleaning">
                <label for="liquid-cleaning">
                    <span class="add-on-name">Liquid Cleaning</span>
                    <span class="add-on-price" id="liquid-cleaning-price">$149.99</span>
                </label>
            </div>
            <div class="add-on">
                <input type="checkbox" id="data-transfer" value="149.99">
                <label for="data-transfer">
                    <span class="add-on-name">Data Transfer</span>
                    <span class="add-on-price">$149.99</span>
                </label>
            </div>
            <div class="add-on" id="expedited-repair-container">
                <input type="checkbox" id="expedited-repair" value="49.99">
                <label for="expedited-repair">
                    <span class="add-on-name">Expedited Repair</span>
                    <span class="add-on-price">$49.99</span>
                </label>
            </div>
        </div>

        <div class="quote-box">
            <div class="quote-label">Your Quote</div>
            <div class="quote-amount" id="quote-amount">$0.00</div>
            <div class="quote-breakdown">
                <div class="breakdown-item">
                    <span>Base Labor:</span>
                    <span id="breakdown-labor">$0.00</span>
                </div>
                <div class="breakdown-item">
                    <span>Part Cost:</span>
                    <span id="breakdown-part">$0.00</span>
                </div>
                <div class="breakdown-item">
                    <span>Add-Ons:</span>
                    <span id="breakdown-addons">$0.00</span>
                </div>
                <div class="breakdown-item margin">
                    <span>Margin:</span>
                    <span id="breakdown-margin">$0.00</span>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button type="button" class="btn-clear" onclick="resetCalculator()">Clear</button>
            <button type="button" class="btn-calculate" onclick="calculateQuote()">Calculate</button>
        </div>
    </div>

    <script>
        const baseLaborRates = {
            phone: 75,
            tablet: 75,
            laptop: 125,
            console: 100
        };

        const basicCleaningPrices = {
            phone: 39.99,
            tablet: 39.99,
            laptop: 129.99,
            console: 129.99
        };

        const liquidCleaningPrices = {
            phone: 149.99,
            tablet: 149.99,
            laptop: 199.99,
            console: 199.99
        };

        function getMultiplier(partCost) {
            if (partCost < 50) return 1.40;
            if (partCost < 100) return 1.40 - ((partCost - 50) / 50) * 0.05;
            if (partCost < 1000) return 1.35 - ((partCost - 100) / 900) * 0.122;
            if (partCost < 5000) return 1.228 + ((partCost - 1000) / 4000) * 0.072;
            return 1.300;
        }

        function updateAddOnPrices() {
            const deviceType = document.getElementById('device-type').value;
            const basicCleaningPriceSpan = document.getElementById('basic-cleaning-price');
            const liquidCleaningPriceSpan = document.getElementById('liquid-cleaning-price');
            const expeditedRepairContainer = document.getElementById('expedited-repair-container');
            
            if (deviceType && basicCleaningPrices[deviceType]) {
                basicCleaningPriceSpan.textContent = '$' + basicCleaningPrices[deviceType].toFixed(2);
            } else {
                basicCleaningPriceSpan.textContent = '$39.99';
            }

            if (deviceType && liquidCleaningPrices[deviceType]) {
                liquidCleaningPriceSpan.textContent = '$' + liquidCleaningPrices[deviceType].toFixed(2);
            } else {
                liquidCleaningPriceSpan.textContent = '$149.99';
            }

            // Hide expedited repair for phones
            if (deviceType === 'phone') {
                expeditedRepairContainer.classList.add('hidden');
                document.getElementById('expedited-repair').checked = false;
            } else {
                expeditedRepairContainer.classList.remove('hidden');
            }
        }

        document.getElementById('device-type').addEventListener('change', updateAddOnPrices);

        function calculateQuote() {
            const deviceType = document.getElementById('device-type').value;
            const partCost = parseFloat(document.getElementById('part-cost').value) || 0;

            if (!deviceType) {
                alert('Please select a device type');
                return;
            }

            const baseLabor = baseLaborRates[deviceType];
            const multiplier = getMultiplier(partCost);
            const baseQuote = Math.floor((baseLabor + partCost) * multiplier) + 0.99;

            let addOnTotal = 0;
            
            // Basic Cleaning (device-specific pricing)
            if (document.getElementById('basic-cleaning').checked) {
                addOnTotal += basicCleaningPrices[deviceType];
            }
            
            // Liquid Cleaning (device-specific pricing)
            if (document.getElementById('liquid-cleaning').checked) {
                addOnTotal += liquidCleaningPrices[deviceType];
            }
            
            // Data Transfer (fixed pricing)
            if (document.getElementById('data-transfer').checked) {
                addOnTotal += 149.99;
            }
            
            // Expedited Repair (fixed pricing, only if not phone)
            if (deviceType !== 'phone' && document.getElementById('expedited-repair').checked) {
                addOnTotal += 49.99;
            }

            const finalQuote = baseQuote + addOnTotal;
            const margin = finalQuote - partCost;

            document.getElementById('quote-amount').textContent = '$' + finalQuote.toFixed(2);
            document.getElementById('breakdown-labor').textContent = '$' + baseLabor.toFixed(2);
            document.getElementById('breakdown-part').textContent = '$' + partCost.toFixed(2);
            document.getElementById('breakdown-addons').textContent = '$' + addOnTotal.toFixed(2);
            document.getElementById('breakdown-margin').textContent = '$' + margin.toFixed(2);
        }

        function resetCalculator() {
            document.getElementById('device-type').value = '';
            document.getElementById('part-cost').value = '';
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('quote-amount').textContent = '$0.00';
            document.getElementById('breakdown-labor').textContent = '$0.00';
            document.getElementById('breakdown-part').textContent = '$0.00';
            document.getElementById('breakdown-addons').textContent = '$0.00';
            document.getElementById('breakdown-margin').textContent = '$0.00';
            document.getElementById('basic-cleaning-price').textContent = '$39.99';
            document.getElementById('liquid-cleaning-price').textContent = '$149.99';
            document.getElementById('expedited-repair-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
