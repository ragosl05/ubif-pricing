<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uBreakiFix Pricing Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Header with Logo */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-img {
            height: 50px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .header-text h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header-text p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Main Content */
        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Checkboxes */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-item input {
            width: auto;
            margin: 0;
        }

        .checkbox-item label {
            margin: 0;
            font-weight: 500;
        }

        /* Quote Display */
        .quote-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 8px;
            color: white;
            text-align: center;
            margin-top: 30px;
        }

        .quote-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .quote-price {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .quote-note {
            font-size: 12px;
            opacity: 0.8;
            font-style: italic;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Breakdown Table */
        .breakdown {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 13px;
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .breakdown-row:last-child {
            border-bottom: none;
            font-weight: 600;
            padding-top: 15px;
            border-top: 2px solid #667eea;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with Actual Logo -->
        <div class="header">
            <img src="YOUR_LOGO_URL_HERE" alt="uBreakiFix" class="logo-img">
            <div class="header-text">
                <h1>Pricing Calculator</h1>
                <p>Get accurate repair quotes instantly</p>
            </div>
        </div>

        <!-- Calculator Form -->
        <div class="content">
            <div class="form-group">
                <label for="deviceType">Device Type</label>
                <select id="deviceType" onchange="updatePrice()">
                    <option value="phone">Phone / Tablet</option>
                    <option value="laptop">Laptop / Desktop</option>
                    <option value="console">Gaming Console</option>
                </select>
            </div>

            <div class="form-group">
                <label for="repairType">Repair Type</label>
                <select id="repairType" onchange="updatePrice()">
                    <option value="screen">Screen Repair</option>
                    <option value="battery">Battery Replacement</option>
                    <option value="water">Water Damage</option>
                    <option value="charge">Charging Port</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="partCost">Part Cost ($)</label>
                <input type="number" id="partCost" placeholder="0.00" min="0" step="0.01" onchange="updatePrice()" oninput="updatePrice()">
            </div>

            <div class="form-group">
                <label>Add-On Services</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="addon1" value="29.99" onchange="updatePrice()">
                        <label for="addon1">Diagnostics ($29.99)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="addon2" value="49.99" onchange="updatePrice()">
                        <label for="addon2">Data Recovery ($49.99)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="addon3" value="79.99" onchange="updatePrice()">
                        <label for="addon3">Extended Warranty ($79.99)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="addon4" value="149.99" onchange="updatePrice()">
                        <label for="addon4">Premium Support ($149.99)</label>
                    </div>
                </div>
            </div>

            <!-- Quote Display -->
            <div class="quote-section">
                <div class="quote-label">Estimated Total Price</div>
                <div class="quote-price" id="quotePrice">$0.00</div>
                <div class="quote-note">*Prices subject to final inspection</div>
            </div>

            <!-- Breakdown -->
            <div class="breakdown" id="breakdown"></div>

            <button onclick="confirmQuote()">Get Quote</button>
        </div>
    </div>

    <script>
        // Pricing Configuration
        const pricingConfig = {
            phone: {
                baseLabor: 100,
                markups: [
                    { threshold: 50, multiplier: 1.50, laborFloor: 187.46 },
                    { threshold: 100, multiplier: 1.35, laborFloor: 250.00 },
                    { threshold: 300, multiplier: 1.25, laborFloor: 600.00 },
                    { threshold: Infinity, multiplier: 1.15, laborFloor: 600.00 }
                ]
            },
            laptop: {
                baseLabor: 150,
                markups: [
                    { threshold: 50, multiplier: 1.50, laborFloor: 199.96 },
                    { threshold: 100, multiplier: 1.35, laborFloor: 275.00 },
                    { threshold: 300, multiplier: 1.25, laborFloor: 675.00 },
                    { threshold: Infinity, multiplier: 1.15, laborFloor: 675.00 }
                ]
            },
            console: {
                baseLabor: 125,
                markups: [
                    { threshold: 50, multiplier: 1.50, laborFloor: 199.96 },
                    { threshold: 100, multiplier: 1.35, laborFloor: 275.00 },
                    { threshold: 300, multiplier: 1.25, laborFloor: 675.00 },
                    { threshold: Infinity, multiplier: 1.15, laborFloor: 675.00 }
                ]
            }
        };

        function roundToNearestNine99(price) {
            const base = Math.floor(price);
            return base + 0.99;
        }

        function updatePrice() {
            const deviceType = document.getElementById('deviceType').value;
            const partCost = parseFloat(document.getElementById('partCost').value) || 0;
            
            const config = pricingConfig[deviceType === 'phone' ? 'phone' : deviceType === 'laptop' ? 'laptop' : 'console'];
            
            // Find applicable markup tier
            let markup = config.markups[0];
            for (let tier of config.markups) {
                if (partCost < tier.threshold) {
                    markup = tier;
                    break;
                }
            }
            
            // Calculate labor with markup
            const markupedLabor = config.baseLabor * markup.multiplier;
            const finalLabor = Math.max(markupedLabor, markup.laborFloor);
            
            // Total before add-ons
            let subtotal = partCost + finalLabor;
            
            // Add selected add-ons
            let addOnsTotal = 0;
            document.querySelectorAll('.checkbox-group input:checked').forEach(checkbox => {
                addOnsTotal += parseFloat(checkbox.value);
            });
            
            const total = subtotal + addOnsTotal;
            const finalPrice = roundToNearestNine99(total);
            
            // Display quote
            document.getElementById('quotePrice').textContent = '$' + finalPrice.toFixed(2);
            
            // Display breakdown
            const breakdown = document.getElementById('breakdown');
            breakdown.innerHTML = `
                <div class="breakdown-row">
                    <span>Parts Cost:</span>
                    <span>$${partCost.toFixed(2)}</span>
                </div>
                <div class="breakdown-row">
                    <span>Labor (Base: $${config.baseLabor.toFixed(2)}, Markup: ${(markup.multiplier * 100).toFixed(0)}%):</span>
                    <span>$${finalLabor.toFixed(2)}</span>
                </div>
                ${addOnsTotal > 0 ? `
                <div class="breakdown-row">
                    <span>Add-On Services:</span>
                    <span>$${addOnsTotal.toFixed(2)}</span>
                </div>
                ` : ''}
                <div class="breakdown-row">
                    <span>Total:</span>
                    <span>$${finalPrice.toFixed(2)}</span>
                </div>
            `;
        }

        function confirmQuote() {
            const price = document.getElementById('quotePrice').textContent;
            alert(`Quote confirmed: ${price}\n\nThank you for choosing uBreakiFix!`);
        }

        // Initialize
        updatePrice();
    </script>
</body>
</html>
