<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uBreakiFix Pricing Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        select,
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        #addOns {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        #addOns label {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            color: #555;
            cursor: pointer;
        }

        #addOns input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
        }

        #result {
            margin-top: 30px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #result > div {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>uBreakiFix Pricing Calculator</h1>

        <div class="form-group">
            <label for="deviceType">Device Type</label>
            <select id="deviceType">
                <option value="">Select a device</option>
                <option value="phone">Phone</option>
                <option value="tablet">Tablet</option>
                <option value="laptop">Laptop</option>
                <option value="desktop">Desktop</option>
                <option value="console">Console</option>
            </select>
        </div>

        <div class="form-group">
            <label for="partCost">Part Cost ($)</label>
            <input type="number" id="partCost" placeholder="Enter part cost" min="0" step="0.01">
        </div>

        <div class="form-group">
            <label>Add-ons</label>
            <div id="addOns">
                <p style="color: #999; font-size: 12px;">Select a device type first.</p>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const pricingConfig = {
            phone: {
                baseLabor: 100,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 29.99 },
                    { name: 'Liquid Cleaning', price: 149.99 },
                    { name: 'Data Transfer', price: 149.99 }
                ]
            },
            tablet: {
                baseLabor: 100,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 29.99 },
                    { name: 'Liquid Cleaning', price: 149.99 },
                    { name: 'Data Transfer', price: 149.99 }
                ]
            },
            laptop: {
                baseLabor: 150,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 99.99 },
                    { name: 'Liquid Cleaning', price: 199.99 },
                    { name: 'Data Transfer', price: 149.99 },
                    { name: 'Expedited Repair', price: 49.99 }
                ]
            },
            desktop: {
                baseLabor: 150,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 99.99 },
                    { name: 'Liquid Cleaning', price: 199.99 },
                    { name: 'Data Transfer', price: 149.99 },
                    { name: 'Expedited Repair', price: 49.99 }
                ]
            },
            console: {
                baseLabor: 125,
                markups: [
                    { threshold: 50, multiplier: 1.50 },
                    { threshold: 100, multiplier: 1.40 },
                    { threshold: 300, multiplier: 1.30 },
                    { threshold: Infinity, multiplier: 1.25 }
                ],
                addOns: [
                    { name: 'Basic Cleaning', price: 99.99 },
                    { name: 'Liquid Cleaning', price: 199.99 },
                    { name: 'Data Transfer', price: 149.99 },
                    { name: 'Expedited Repair', price: 49.99 }
                ]
            }
        };

        function calculateQuote() {
            const deviceType = document.getElementById('deviceType').value;
            const partCost = parseFloat(document.getElementById('partCost').value) || 0;
            const selectedAddOns = Array.from(document.querySelectorAll('input[name="addOn"]:checked'))
                .map(checkbox => parseFloat(checkbox.value));

            if (!deviceType || partCost < 0) {
                document.getElementById('result').innerHTML = '<p style="color: #e74c3c;">Please enter valid inputs.</p>';
                return;
            }

            const config = pricingConfig[deviceType];
            const applicableMarkup = config.markups.find(m => partCost <= m.threshold);
            const multiplier = applicableMarkup.multiplier;

            const laborRounded = Math.round((config.baseLabor + partCost) * multiplier * 100) / 100;
            const roundedQuote = Math.floor(laborRounded * 100 + 99) / 100;

            const addOnTotal = selectedAddOns.reduce((sum, price) => sum + price, 0);
            const finalTotal = Math.round((roundedQuote + addOnTotal) * 100) / 100;

            const margin = laborRounded - partCost;
            const markupPercent = partCost > 0 ? ((margin / partCost) * 100).toFixed(0) : 0;

            document.getElementById('result').innerHTML = `
                <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 10px; color: white; text-align: center;">
                    <p style="font-size: 12px; margin: 0 0 10px 0; opacity: 0.9;">by asurion</p>
                    <p style="font-size: 14px; margin: 5px 0;">Base Labor: $${config.baseLabor.toFixed(2)}</p>
                    <p style="font-size: 14px; margin: 5px 0;">Part Cost: $${partCost.toFixed(2)}</p>
                    <p style="font-size: 14px; margin: 5px 0;">Multiplier: ${multiplier}x</p>
                    <p style="font-size: 14px; margin: 5px 0;">Labor Quote: $${roundedQuote.toFixed(2)}</p>
                    <p style="font-size: 14px; margin: 5px 0;">Add-ons Total: $${addOnTotal.toFixed(2)}</p>
                    <p style="font-size: 18px; font-weight: bold; margin: 15px 0;">Final Quote: $${finalTotal.toFixed(2)}</p>
                    <p style="font-size: 12px; margin: 10px 0; opacity: 0.9;">Margin: $${margin.toFixed(2)} (${markupPercent}%)</p>
                </div>
            `;
        }

        function updateAddOns() {
            const deviceType = document.getElementById('deviceType').value;
            const addOnContainer = document.getElementById('addOns');

            if (!deviceType) {
                addOnContainer.innerHTML = '<p style="color: #999; font-size: 12px;">Select a device type first.</p>';
                return;
            }

            const config = pricingConfig[deviceType];
            addOnContainer.innerHTML = config.addOns.map(addOn =>
                `<label style="display: block; margin: 8px 0;">
                    <input type="checkbox" name="addOn" value="${addOn.price}" onchange="calculateQuote()">
                    ${addOn.name} - $${addOn.price.toFixed(2)}
                </label>`
            ).join('');
        }

        document.getElementById('deviceType').addEventListener('change', updateAddOns);
        document.getElementById('partCost').addEventListener('input', calculateQuote);
    </script>
</body>
</html>
